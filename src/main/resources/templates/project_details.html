<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head}">
    <meta charset="UTF-8">
    <title>Project Details - AcademiaFlow</title>
</head>
<body>

<div th:replace="~{base :: navbar}"></div>

<div class="container py-3">
    
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" style="border-radius: var(--radius-md); border: none; background: rgba(16, 185, 129, 0.08); color: #059669;">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" style="border-radius: var(--radius-md); border: none; background: rgba(239, 68, 68, 0.08); color: #dc2626;">
        <i class="bi bi-exclamation-circle-fill me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <a href="/projects" class="btn btn-sm btn-outline-secondary mb-3 px-3"><i class="bi bi-arrow-left me-1"></i> Back</a>

    <!-- Project Header -->
    <div class="premium-card p-4 mb-4" style="border: none; background: linear-gradient(135deg, rgba(99,102,241,0.06), rgba(139,92,246,0.04));">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
            <div class="d-flex align-items-start gap-3">
                <div style="width: 48px; height: 48px; border-radius: 14px; background: linear-gradient(135deg, var(--primary), var(--accent)); display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                    <i class="bi bi-folder-fill text-white" style="font-size: 22px;"></i>
                </div>
                <div>
                    <h2 class="fw-bold mb-1" style="font-size: 1.4rem;" th:text="${project.name}">Name</h2>
                    <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.5rem;" th:text="${project.description}">Desc</p>
                    <div class="d-flex align-items-center gap-3 flex-wrap" style="font-size: 0.8rem; color: var(--text-muted);">
                        <span th:if="${project.dueDate != null}"><i class="bi bi-calendar-event me-1"></i> <span th:text="${#temporals.format(project.dueDate, 'MMM dd, yyyy')}">Due</span></span>
                        <span><i class="bi bi-people me-1"></i> <span th:text="${#lists.size(members)}">0</span> members</span>
                        <span><i class="bi bi-list-task me-1"></i> <span th:text="${#lists.size(tasks)}">0</span> tasks</span>
                    </div>
                </div>
            </div>
            <div class="d-flex align-items-center gap-2">
                <span class="tag tag-primary" th:text="${role}">Role</span>
                <div th:if="${role == 'OWNER'}" class="d-flex gap-2">
                    <button class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" data-bs-target="#editProjectModal"><i class="bi bi-pencil me-1"></i>Edit</button>
                    <form th:action="@{'/projects/' + ${project.id} + '/delete'}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete this project forever?');"><i class="bi bi-trash me-1"></i>Delete</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Project Progress Bar -->
        <div th:if="${!#lists.isEmpty(tasks)}" class="mt-3 pt-3" style="border-top: 1px solid var(--border-light);">
            <div class="d-flex justify-content-between mb-1" style="font-size: 0.78rem; color: var(--text-muted);">
                <span>Progress</span>
                <span id="progressText">0%</span>
            </div>
            <div class="progress" style="height: 6px;">
                <div class="progress-bar" role="progressbar" id="projectProgress" style="width: 0%;"></div>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <!-- Tasks Column -->
        <div class="col-md-8">
            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                <h5 class="fw-bold mb-0"><i class="bi bi-list-task me-2 text-gradient"></i>Tasks</h5>
                <div class="d-flex gap-2 align-items-center">
                    <!-- Task Filters -->
                    <div class="filter-bar" id="filterBar">
                        <button class="filter-btn active" onclick="filterTasks('all', this)">All</button>
                        <button class="filter-btn" onclick="filterTasks('TODO', this)">To Do</button>
                        <button class="filter-btn" onclick="filterTasks('IN_PROGRESS', this)">In Progress</button>
                        <button class="filter-btn" onclick="filterTasks('COMPLETED', this)">Done</button>
                    </div>
                    <button th:if="${role == 'OWNER' or role == 'MEMBER'}" class="btn btn-primary btn-sm px-3" data-bs-toggle="modal" data-bs-target="#createTaskModal">
                        <i class="bi bi-plus-lg me-1"></i> Add
                    </button>
                </div>
            </div>

            <!-- Quick Add Task -->
            <div th:if="${role == 'OWNER' or role == 'MEMBER'}" class="mb-3">
                <form th:action="@{'/projects/' + ${project.id} + '/tasks/create'}" method="post" class="d-flex gap-2">
                    <input type="text" name="title" class="quick-add-input" placeholder="+ Quick add task... (press Enter)" required>
                    <input type="hidden" name="priority" value="MEDIUM">
                </form>
            </div>
            
            <div class="premium-card p-0 overflow-hidden" style="border: none;">
                <div class="list-group list-group-flush">
                    <div class="list-group-item p-3 task-item" th:each="task : ${tasks}" th:data-status="${task.status}" th:data-priority="${task.priority}"
                         th:classappend="${task.dueDate != null and task.dueDate.isBefore(T(java.time.LocalDate).now()) ? 'deadline-urgent' : (task.dueDate != null and task.dueDate.isBefore(T(java.time.LocalDate).now().plusDays(3)) ? 'deadline-soon' : '')}">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="flex-grow-1">
                                <div class="d-flex align-items-center gap-2 mb-1">
                                    <h6 class="fw-bold mb-0" style="font-size: 0.92rem;" th:text="${task.title}">Task</h6>
                                </div>
                                <p style="color: var(--text-muted); font-size: 0.82rem; margin-bottom: 0.5rem;" th:if="${task.description != null}" th:text="${task.description}">Desc</p>
                                
                                <div class="d-flex align-items-center gap-2 flex-wrap">
                                    <span class="priority-badge"
                                          th:classappend="${task.priority == 'HIGH' ? 'priority-high' : (task.priority == 'MEDIUM' ? 'priority-medium' : 'priority-low')}"
                                          th:text="${task.priority}">Priority</span>
                                    <span class="status-badge"
                                          th:classappend="${task.status == 'TODO' ? 'status-todo' : (task.status == 'IN_PROGRESS' ? 'status-progress' : (task.status == 'REVIEW' ? 'status-review' : 'status-done'))}" 
                                          th:text="${task.status}">Status</span>
                                    <span th:if="${task.assignedTo != null}" style="font-size: 0.75rem; color: var(--text-muted);">
                                        <i class="bi bi-person me-1"></i><span th:text="${task.assignedTo.name}">User</span>
                                    </span>
                                    <span th:if="${task.dueDate != null}" style="font-size: 0.75rem;" 
                                          th:classappend="${task.dueDate.isBefore(T(java.time.LocalDate).now()) ? 'text-danger fw-bold' : 'text-muted'}">
                                        <i class="bi bi-calendar me-1"></i><span th:text="${#temporals.format(task.dueDate, 'MMM dd')}">Due</span>
                                    </span>
                                </div>
                            </div>
                            
                            <div class="d-flex gap-2 align-items-center ms-2" th:if="${role == 'OWNER' or role == 'MEMBER'}">
                                <form th:action="@{'/projects/' + ${project.id} + '/tasks/' + ${task.id} + '/status'}" method="post">
                                    <select name="status" class="form-select form-select-sm" style="width: auto; font-size: 0.78rem; border-radius: var(--radius-sm);" onchange="this.form.submit()">
                                        <option value="TODO" th:selected="${task.status == 'TODO'}">To Do</option>
                                        <option value="IN_PROGRESS" th:selected="${task.status == 'IN_PROGRESS'}">In Progress</option>
                                        <option value="REVIEW" th:selected="${task.status == 'REVIEW'}">Review</option>
                                        <option value="COMPLETED" th:selected="${task.status == 'COMPLETED'}">Done</option>
                                    </select>
                                </form>
                                <form th:action="@{'/projects/' + ${project.id} + '/tasks/' + ${task.id} + '/delete'}" method="post">
                                    <button type="submit" class="btn btn-sm btn-outline-danger" style="font-size: 0.75rem;" onclick="return confirm('Delete task?')"><i class="bi bi-trash"></i></button>
                                </form>
                            </div>
                        </div>
                    </div>
                    <div th:if="${#lists.isEmpty(tasks)}" class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <p style="color: var(--text-muted);">No tasks yet. Add one above!</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Members Column -->
        <div class="col-md-4">
            <div class="premium-card p-4" style="border: none;">
                <h5 class="fw-bold mb-3" style="font-size: 1rem;"><i class="bi bi-people-fill me-2 text-gradient"></i>Team</h5>

                <!-- Avatar Stack -->
                <div class="avatar-stack mb-3">
                    <div class="avatar-sm" th:each="member : ${members}" th:text="${member.user.initial}" th:title="${member.user.name}">?</div>
                </div>

                <ul class="list-unstyled mb-4">
                    <li th:each="member : ${members}" class="d-flex justify-content-between align-items-center mb-3">
                        <div class="d-flex align-items-center gap-2">
                            <div class="avatar-sm" style="width: 28px; height: 28px; font-size: 11px;" th:text="${member.user.initial}">?</div>
                            <div>
                                <div class="fw-bold" style="font-size: 0.85rem;" th:text="${member.user.name}">Name</div>
                                <div style="color: var(--text-muted); font-size: 0.7rem;" th:text="${member.user.email}">Email</div>
                            </div>
                        </div>
                        <span class="tag tag-primary" style="font-size: 0.65rem;" th:text="${member.role}">Role</span>
                    </li>
                </ul>

                <th:block th:if="${role == 'OWNER'}">
                    <div class="divider"></div>
                    <h6 class="section-label">Invite Member</h6>
                    <form th:action="@{'/projects/' + ${project.id} + '/members/add'}" method="post">
                        <div class="mb-2">
                            <input type="email" name="email" class="form-control form-control-sm" placeholder="user@email.com" required>
                        </div>
                        <div class="mb-2">
                            <select name="roleStr" class="form-select form-select-sm" required>
                                <option value="MEMBER">Member</option>
                                <option value="VIEWER">Viewer</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-sm btn-primary w-100"><i class="bi bi-person-plus me-1"></i>Add Member</button>
                    </form>
                </th:block>
            </div>
        </div>
    </div>
</div>

<!-- Create Task Modal -->
<div class="modal fade" id="createTaskModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0" style="border-radius: var(--radius-xl); overflow: hidden;">
            <div class="modal-header border-0 px-4 pt-4 pb-0">
                <h5 class="modal-title fw-bold"><i class="bi bi-plus-circle me-2 text-gradient"></i>Add Task</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{'/projects/' + ${project.id} + '/tasks/create'}" method="post">
                <div class="modal-body px-4 py-3">
                    <div class="mb-3">
                        <label class="form-label">Task Title</label>
                        <input type="text" name="title" class="form-control" required placeholder="What needs to be done?">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="2" placeholder="Optional details..."></textarea>
                    </div>
                    <div class="row g-3">
                        <div class="col-4">
                            <label class="form-label">Priority</label>
                            <select name="priority" class="form-select">
                                <option value="LOW">🟢 Low</option>
                                <option value="MEDIUM" selected>🟡 Medium</option>
                                <option value="HIGH">🔴 High</option>
                            </select>
                        </div>
                        <div class="col-4">
                            <label class="form-label">Due Date</label>
                            <input type="date" name="dueDate" class="form-control">
                        </div>
                        <div class="col-4">
                            <label class="form-label">Assign To</label>
                            <select name="assignedTo" class="form-select">
                                <option value="">Unassigned</option>
                                <option th:each="m : ${members}" th:value="${m.user.id}" th:text="${m.user.name}"></option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0 px-4 pb-4 pt-0">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary px-4">Add Task</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Edit Project Modal -->
<div class="modal fade" id="editProjectModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0" style="border-radius: var(--radius-xl); overflow: hidden;">
            <div class="modal-header border-0 px-4 pt-4 pb-0">
                <h5 class="modal-title fw-bold"><i class="bi bi-pencil me-2 text-gradient"></i>Edit Project</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{'/projects/' + ${project.id} + '/edit'}" method="post">
                <div class="modal-body px-4 py-3">
                    <div class="mb-3">
                        <label class="form-label">Project Name</label>
                        <input type="text" name="name" class="form-control" th:value="${project.name}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="3" th:text="${project.description}"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Due Date</label>
                        <input type="date" name="dueDate" class="form-control" th:value="${project.dueDate}">
                    </div>
                </div>
                <div class="modal-footer border-0 px-4 pb-4 pt-0">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary px-4">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // Task filter
    function filterTasks(status, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.task-item').forEach(item => {
            if (status === 'all' || item.dataset.status === status) {
                item.style.display = '';
            } else {
                item.style.display = 'none';
            }
        });
    }

    // Calculate project progress
    document.addEventListener('DOMContentLoaded', function() {
        const tasks = document.querySelectorAll('.task-item');
        const total = tasks.length;
        const completed = document.querySelectorAll('.task-item[data-status="COMPLETED"]').length;
        const pct = total > 0 ? Math.round(completed * 100 / total) : 0;
        const bar = document.getElementById('projectProgress');
        const txt = document.getElementById('progressText');
        if (bar) { setTimeout(() => { bar.style.width = pct + '%'; }, 200); }
        if (txt) { txt.textContent = pct + '%'; }
    });
</script>

<div th:replace="~{base :: footer}"></div>

<div th:replace="~{base :: chatbot}"></div>
<div th:replace="~{base :: theme-script}"></div>
<div th:replace="~{base :: scripts}"></div>
</body>
</html>
