<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head}">
    <meta charset="UTF-8">
    <title>Change Password - AcademiaFlow</title>
</head>
<body>

<div th:replace="~{base :: navbar}"></div>

<div class="container py-3">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <p class="section-label mb-1">Security</p>
                    <h2 class="fw-bold" style="font-size: 1.5rem;"><i class="bi bi-shield-lock me-2 text-gradient"></i>Change Password</h2>
                </div>
                <a href="/profile" class="btn btn-outline-secondary btn-sm px-3"><i class="bi bi-arrow-left me-1"></i> Back</a>
            </div>

            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" style="border-radius: var(--radius-md); border: none; background: rgba(239, 68, 68, 0.08); color: #dc2626;">
                <i class="bi bi-exclamation-circle-fill me-2"></i><span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" style="border-radius: var(--radius-md); border: none; background: rgba(16, 185, 129, 0.08); color: #059669;">
                <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="premium-card p-4" style="border: none;">
                <form action="/profile/change-password" method="post">
                    <div class="mb-3">
                        <label class="form-label">Current Password</label>
                        <input type="password" name="oldPassword" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">New Password</label>
                        <input type="password" name="newPassword" class="form-control" required minlength="6" placeholder="Minimum 6 characters">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Confirm New Password</label>
                        <input type="password" name="confirmPassword" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2"><i class="bi bi-check2-circle me-1"></i> Update Password</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{base :: footer}"></div>

<div th:replace="~{base :: chatbot}"></div>
<div th:replace="~{base :: theme-script}"></div>
<div th:replace="~{base :: scripts}"></div>
</body>
</html>
