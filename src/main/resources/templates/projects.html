<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head}">
    <meta charset="UTF-8">
    <title>Projects - AcademiaFlow</title>
</head>
<body>

<div th:replace="~{base :: navbar}"></div>

<div class="container py-3">
    
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" style="border-radius: var(--radius-md); border: none; background: rgba(16, 185, 129, 0.08); color: #059669;">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" style="border-radius: var(--radius-md); border: none; background: rgba(239, 68, 68, 0.08); color: #dc2626;">
        <i class="bi bi-exclamation-circle-fill me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <p class="section-label mb-1">Workspace</p>
            <h2 class="fw-bold" style="font-size: 1.5rem;">My Projects</h2>
        </div>
        <button class="btn btn-primary px-4" data-bs-toggle="modal" data-bs-target="#createProjectModal">
            <i class="bi bi-plus-lg me-1"></i> New Project
        </button>
    </div>

    <div class="row g-4">
        <div class="col-md-4" th:each="membership : ${memberships}">
            <div class="card premium-card h-100 p-4" style="border: none;">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <div class="d-flex align-items-center gap-2">
                        <div style="width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--primary), var(--accent)); display: flex; align-items: center; justify-content: center;">
                            <i class="bi bi-folder-fill text-white" style="font-size: 16px;"></i>
                        </div>
                        <h5 class="fw-bold mb-0 text-truncate" style="font-size: 1rem; max-width: 180px;" th:text="${membership.project.name}">Project</h5>
                    </div>
                    <span class="tag tag-primary" style="font-size: 0.68rem;" th:text="${membership.role}">Role</span>
                </div>
                <p style="color: var(--text-muted); font-size: 0.85rem; min-height: 2.5em;" class="mb-3" th:text="${membership.project.description != null ? membership.project.description : 'No description'}">Desc</p>
                
                <div th:if="${membership.project.dueDate != null}" class="mb-3">
                    <span style="color: var(--text-muted); font-size: 0.78rem;">
                        <i class="bi bi-calendar-event me-1"></i>
                        <span th:text="${#temporals.format(membership.project.dueDate, 'MMM dd, yyyy')}">Date</span>
                    </span>
                </div>
                
                <div class="mt-auto d-flex justify-content-between align-items-center pt-2" style="border-top: 1px solid var(--border-light);">
                    <span style="color: var(--text-muted); font-size: 0.75rem;">
                        <i class="bi bi-clock me-1"></i>
                        <span th:text="${#temporals.format(membership.project.createdAt, 'MMM dd')}">Date</span>
                    </span>
                    <a th:href="@{'/projects/' + ${membership.project.id}}" class="btn btn-sm btn-primary px-3" style="font-size: 0.8rem;">
                        Open <i class="bi bi-arrow-right ms-1"></i>
                    </a>
                </div>
            </div>
        </div>
        
        <div class="col-12" th:if="${#lists.isEmpty(memberships)}">
            <div class="empty-state premium-card">
                <div class="empty-state-icon">📁</div>
                <h5 class="fw-bold" style="color: var(--text-secondary);">No projects yet</h5>
                <p style="color: var(--text-muted);">Create your first project to get started!</p>
                <button class="btn btn-primary px-4" data-bs-toggle="modal" data-bs-target="#createProjectModal">
                    <i class="bi bi-plus-lg me-1"></i> Create Project
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Create Project Modal -->
<div class="modal fade" id="createProjectModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0" style="border-radius: var(--radius-xl); overflow: hidden;">
            <div class="modal-header border-0 px-4 pt-4 pb-0">
                <h5 class="modal-title fw-bold"><i class="bi bi-folder-plus me-2 text-gradient"></i>New Project</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form action="/projects/create" method="post">
                <div class="modal-body px-4 py-3">
                    <div class="mb-3">
                        <label class="form-label">Project Name</label>
                        <input type="text" name="name" class="form-control" placeholder="e.g. Final Year Project" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="3" placeholder="What is this project about?"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Due Date</label>
                        <input type="date" name="dueDate" class="form-control">
                    </div>
                </div>
                <div class="modal-footer border-0 px-4 pb-4 pt-0">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary px-4">Create Project</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{base :: footer}"></div>

<div th:replace="~{base :: chatbot}"></div>
<div th:replace="~{base :: theme-script}"></div>
<div th:replace="~{base :: scripts}"></div>
</body>
</html>
