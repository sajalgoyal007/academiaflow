<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - AcademiaFlow</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-wrapper">
    <div class="container d-flex justify-content-center">
        <div class="card auth-card p-5" style="max-width: 420px; width: 100%; border: none;">
            <div class="text-center mb-4">
                <div style="font-size: 2.5rem; margin-bottom: 0.5rem;">🚀</div>
                <h2 class="fw-bold text-gradient" style="font-size: 1.6rem;">Join AcademiaFlow</h2>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Create an account to manage your projects.</p>
            </div>

            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" style="border-radius: var(--radius-md); font-size: 0.85rem;">
                <i class="bi bi-exclamation-circle-fill me-1"></i><span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" style="font-size: 0.7rem;"></button>
            </div>

            <form action="/signup" method="post">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text" style="border: none; background: var(--bg-secondary);"><i class="bi bi-person" style="color: var(--text-muted);"></i></span>
                        <input type="text" class="form-control" name="name" required placeholder="Sajal Goyal" style="border: none; background: var(--bg-secondary);">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text" style="border: none; background: var(--bg-secondary);"><i class="bi bi-envelope" style="color: var(--text-muted);"></i></span>
                        <input type="email" class="form-control" name="email" required placeholder="you@example.com" style="border: none; background: var(--bg-secondary);">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text" style="border: none; background: var(--bg-secondary);"><i class="bi bi-lock" style="color: var(--text-muted);"></i></span>
                        <input type="password" class="form-control" name="password" required minlength="6" placeholder="Min 6 characters" style="border: none; background: var(--bg-secondary);">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 mb-3 py-2" style="font-size: 1rem;"><i class="bi bi-person-plus me-2"></i>Create Account</button>
                <div class="text-center">
                    <span style="color: var(--text-muted); font-size: 0.85rem;">Already have an account?</span> 
                    <a href="/login" style="color: var(--primary); text-decoration: none; font-weight: 600; font-size: 0.85rem;">Sign in</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
